name: SEO Intelligence — Daily Pipeline

on:
  schedule:
    # Runs every day at 03:00 UTC (06:00 EAT — before business hours in Uganda)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      command:
        description: "Pipeline command to run"
        required: false
        default: "run"
        type: choice
        options:
          - run
          - discover
          - trends
          - classify
          - serp
          - pages
          - competitors
          - gaps
          - score
          - briefs
          - reports
      commit_reports:
        description: "Commit generated reports back to the repository"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: seo-pipeline
  cancel-in-progress: false

# Default to read-only; the commit step conditionally needs write access.
# When COMMIT_REPORTS is enabled, GitHub requires this explicit permission.
permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  seo-pipeline:
    name: Run SEO Intelligence Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # ── Install dependencies ────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Run the pipeline ────────────────────────────────────────────────────
      - name: Run SEO pipeline
        env:
          GOOGLE_CSE_API_KEY:    ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ID:         ${{ secrets.GOOGLE_CSE_ID }}
          DATAFORSEO_LOGIN:      ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD:   ${{ secrets.DATAFORSEO_PASSWORD }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          COMMIT_REPORTS:        ${{ github.event.inputs.commit_reports || 'false' }}
          RATE_LIMIT_DELAY:      "2.0"
          EXPAND_ALPHABET:       "true"
          TRENDS_TIMEFRAME:      "today 3-m"
        run: |
          COMMAND="${{ github.event.inputs.command || 'run' }}"
          echo "Running command: python main.py $COMMAND"
          python main.py $COMMAND

      # ── Upload reports as workflow artifacts ────────────────────────────────
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-reports-${{ github.run_id }}
          path: |
            reports/
            logs/
          retention-days: 90
          if-no-files-found: warn

      # ── Upload database as artifact ─────────────────────────────────────────
      - name: Upload database snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-database-${{ github.run_id }}
          path: data/seo_intelligence.db
          retention-days: 30
          if-no-files-found: warn

      # ── Commit reports back to repo (optional) ──────────────────────────────
      - name: Commit reports to repository
        if: >
          success() &&
          (github.event.inputs.commit_reports == 'true' ||
           (github.event_name == 'schedule' && vars.COMMIT_REPORTS == 'true'))
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add reports/ || true
          git diff --cached --quiet || \
            git commit -m "chore: update SEO reports [$(date -u '+%Y-%m-%d')]" && \
            git push

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Workflow summary
        if: always()
        run: |
          echo "## SEO Intelligence Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Run date | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| Command  | ${{ github.event.inputs.command || 'run' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger  | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "reports" ]; then
            echo "### Generated Reports" >> $GITHUB_STEP_SUMMARY
            ls -lh reports/ | awk '{print "- " $NF " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/seo_intelligence.db" ]; then
            DB_SIZE=$(du -sh data/seo_intelligence.db | cut -f1)
            echo "Database size: **$DB_SIZE**" >> $GITHUB_STEP_SUMMARY
          fi
